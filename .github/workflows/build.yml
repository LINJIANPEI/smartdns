name: SmartDNS Android ARM64 TLS Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_API: 21
      NDK_VERSION: r26d

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git make wget unzip

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip android-ndk-${NDK_VERSION}-linux.zip

      - name: Setup env
        run: |
          echo "NDK=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
          echo "$PWD/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build SmartDNS (ARM64 + TLS)
        run: |
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH

          export CC=aarch64-linux-android${ANDROID_API}-clang
          export CXX=aarch64-linux-android${ANDROID_API}-clang++

          make clean || true

          make \
            CC=$CC \
            CXX=$CXX \
            WITH_TLS=1 \
            WITH_OPENSSL=0 \
            -j$(nproc)

          mkdir -p dist
          cp src/smartdns dist/smartdns-android-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartdns-android-arm64
          path: dist/