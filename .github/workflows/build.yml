name: smartdns-release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

# =========================
# VERSION
# =========================
  version:
    runs-on: ubuntu-latest
    outputs:
      stable: ${{ steps.v.outputs.stable }}
      nightly: ${{ steps.v.outputs.nightly }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: v
        run: |
          DATE=$(date +%Y%m%d)
          RUN=${GITHUB_RUN_NUMBER}

          NIGHTLY="nightly-${DATE}-${RUN}"

          LAST=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LAST" ]; then
            LAST="v1.0.0"
          fi

          IFS='.' read -r M m p <<< "${LAST#v}"
          p=$((p+1))

          STABLE="v${M}.${m}.${p}"

          echo "stable=$STABLE" >> $GITHUB_OUTPUT
          echo "nightly=$NIGHTLY" >> $GITHUB_OUTPUT

# =========================
# MULTI-ARCH BUILD (FIX ALL ARM ISSUES)
# =========================
  build:
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      # 🚀 开启 buildx + qemu（关键）
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # =========================
      # AMD64 build
      # =========================
      - name: Build AMD64
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile \
            --output type=local,dest=dist-amd64 \
            .

      # =========================
      # ARM64 build (FIXED)
      # =========================
      - name: Build ARM64
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f Dockerfile \
            --output type=local,dest=dist-arm64 \
            .

      # =========================
      # MUSL build
      # =========================
      - name: Build MUSL
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg MUSL=1 \
            -f Dockerfile \
            --output type=local,dest=dist-musl \
            .

      # =========================
      # Android build (native fallback)
      # =========================
      - name: Build Android
        run: |
          sudo apt update
          sudo apt install -y build-essential git wget unzip

          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip

          export NDK=$PWD/android-ndk-r26d
          export CC=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang

          make clean || true
          make CC=$CC -j$(nproc)

          mkdir -p dist-android
          cp src/smartdns dist-android/smartdns-android-arm64-v8a

      # =========================
      # UPLOAD
      # =========================
      - uses: actions/upload-artifact@v4
        with:
          name: amd64
          path: dist-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: arm64
          path: dist-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: musl
          path: dist-musl

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist-android

# =========================
# RELEASE
# =========================
  release:
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with: { name: amd64 }

      - uses: actions/download-artifact@v4
        with: { name: arm64 }

      - uses: actions/download-artifact@v4
        with: { name: musl }

      - uses: actions/download-artifact@v4
        with: { name: android }

      # =========================
      # STABLE RELEASE
      # =========================
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.stable }}
          name: SmartDNS ${{ needs.version.outputs.stable }}
          files: |
            smartdns
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # NIGHTLY RELEASE
      # =========================
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.nightly }}
          prerelease: true
          name: SmartDNS Nightly
          files: |
            smartdns
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}