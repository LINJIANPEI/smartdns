name: SmartDNS Android arm64 build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_API: 21
      NDK: ${{ github.workspace }}/android-ndk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          mv android-ndk-r26d $NDK

      # ========= OpenSSL =========
      - name: Build OpenSSL
        run: |
          git clone --depth=1 https://github.com/openssl/openssl.git
          cd openssl

          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH

          export CC=aarch64-linux-android-clang
          export CXX=aarch64-linux-android-clang++
          export AR=llvm-ar
          export AS=llvm-as
          export LD=ld.lld
          export RANLIB=llvm-ranlib
          export STRIP=llvm-strip

          ./Configure android-arm64 \
            no-shared no-tests \
            --prefix=$PWD/../openssl-build

          make -j$(nproc)
          make install_sw

      # ========= SmartDNS =========
      - name: Build SmartDNS
        run: |
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH

          export CC=aarch64-linux-android-clang
          export CXX=aarch64-linux-android-clang++

          make clean || true

          make \
            WITH_TLS=1 \
            WITH_OPENSSL=1 \
            OPENSSL_DIR=$PWD/openssl-build \
            -j$(nproc)

      - name: Package
        run: |
          mkdir -p dist
          cp src/smartdns dist/smartdns-android-arm64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: smartdns-android-arm64
          path: dist/