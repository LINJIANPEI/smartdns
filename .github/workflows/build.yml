name: Android Build (SmartDNS + TLS)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      ANDROID_NDK_VERSION: r26d
      ANDROID_API: 21

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # рЯУ• дЄЛиљљ Android NDK
    - name: Setup Android NDK
      run: |
        wget https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
        unzip android-ndk-${ANDROID_NDK_VERSION}-linux.zip
        echo "NDK=$PWD/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

    # вЪ° зЉУе≠Ш OpenSSLпЉИйБњеЕНйЗНе§НзЉЦиѓСпЉЙ
    - name: Cache OpenSSL
      uses: actions/cache@v4
      with:
        path: openssl-build
        key: openssl-android-arm64-v1

    # рЯФР зЉЦиѓС OpenSSLпЉИдїЕй¶Цжђ°пЉЙ
    - name: Build OpenSSL (Android ARM64)
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/openssl/openssl.git
        cd openssl

        export ANDROID_NDK=$NDK
        export PATH=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH

        ./Configure android-arm64 \
          -D__ANDROID_API__=${ANDROID_API} \
          --prefix=$PWD/../openssl-build

        make -j$(nproc)
        make install_sw

    # рЯФІ иЃЊзљЃзЉЦиѓСзОѓеҐГ
    - name: Setup Toolchain
      run: |
        echo "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

    # рЯІ± зЉЦиѓС SmartDNSпЉИеЄ¶ TLSпЉЙ
    - name: Build SmartDNS (Android ARM64)
      run: |
        make clean || true

        export CC=aarch64-linux-android${ANDROID_API}-clang

        make \
          CC=$CC \
          CFLAGS="-I$PWD/openssl-build/include" \
          LDFLAGS="-L$PWD/openssl-build/lib" \
          -j$(nproc)

        mkdir -p dist
        cp src/smartdns dist/smartdns-android-arm64-v8a

    # рЯУ¶ еОЛзЉ©
    - name: Package
      run: |
        cd dist
        tar -czf smartdns-android-arm64-v8a.tar.gz smartdns-android-arm64-v8a

    # рЯЪА еПСеЄГ
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: android-build-${{ github.run_number }}
        files: |
          dist/smartdns-android-arm64-v8a
          dist/smartdns-android-arm64-v8a.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}