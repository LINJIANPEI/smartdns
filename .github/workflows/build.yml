name: smartdns-pro-release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

# =========================
# VERSION
# =========================
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      nightly: ${{ steps.tag.outputs.nightly }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: tag
        run: |
          git fetch --tags

          DATE=$(date +%Y%m%d)
          RUN=${GITHUB_RUN_NUMBER}

          NIGHTLY="nightly-${DATE}-${RUN}"

          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v1.0.0"
          fi

          IFS='.' read -r major minor patch <<< "${LAST_TAG#v}"
          patch=$((patch + 1))

          STABLE="v${major}.${minor}.${patch}"

          echo "tag=$STABLE" >> $GITHUB_OUTPUT
          echo "nightly=$NIGHTLY" >> $GITHUB_OUTPUT

# =========================
# LINUX AMD64 (glibc)
# =========================
  linux-amd64:
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

          make clean || true
          make -j$(nproc)

          mkdir -p dist
          cp src/smartdns dist/smartdns-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: amd64
          path: dist/smartdns-linux-amd64

# =========================
# LINUX ARM64
# =========================
  linux-arm64:
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

          make clean || true

          make CC=aarch64-linux-gnu-gcc \
               CXX=aarch64-linux-gnu-g++ \
               -j$(nproc)

          mkdir -p dist
          cp src/smartdns dist/smartdns-linux-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: arm64
          path: dist/smartdns-linux-arm64

# =========================
# MUSL (static lightweight)
# =========================
  linux-musl:
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools build-essential

          make clean || true

          make CC=musl-gcc CXX=musl-g++ \
               LDFLAGS="-static" \
               -j$(nproc)

          mkdir -p dist
          cp src/smartdns dist/smartdns-linux-musl-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: musl
          path: dist/smartdns-linux-musl-amd64

# =========================
# ANDROID (arm64-v8a)
# =========================
  android-arm64:
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - name: Install NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Build Android
        run: |
          export CC=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang

          make clean || true

          make CC=$CC -j$(nproc)

          mkdir -p dist
          cp src/smartdns dist/smartdns-android-arm64-v8a

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/smartdns-android-arm64-v8a

# =========================
# STABLE RELEASE
# =========================
  release-stable:
    needs: [version, linux-amd64, linux-arm64, linux-musl, android-arm64]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: amd64

      - uses: actions/download-artifact@v4
        with:
          name: arm64

      - uses: actions/download-artifact@v4
        with:
          name: musl

      - uses: actions/download-artifact@v4
        with:
          name: android

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: SmartDNS ${{ needs.version.outputs.tag }}
          body: |
            ## 🚀 Stable Release

            ✔ Linux amd64  
            ✔ Linux arm64  
            ✔ Linux musl (static)  
            ✔ Android arm64-v8a  
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: |
            smartdns-linux-amd64
            smartdns-linux-arm64
            smartdns-linux-musl-amd64
            smartdns-android-arm64-v8a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# =========================
# NIGHTLY RELEASE
# =========================
  release-nightly:
    needs: [version, linux-amd64, linux-arm64]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: amd64

      - uses: actions/download-artifact@v4
        with:
          name: arm64

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.nightly }}
          name: SmartDNS Nightly
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.nightly }}
          files: |
            smartdns-linux-amd64
            smartdns-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}