name: SmartDNS Android ARM64 TLS Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      ANDROID_API: 21
      NDK_VERSION: r26d
      OPENSSL_VERSION: openssl-3.0.13

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # =========================
    # 1. дё‹иЅЅ Android NDK
    # =========================
    - name: Setup NDK
      run: |
        wget https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
        unzip android-ndk-${NDK_VERSION}-linux.zip
        echo "NDK=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

    # =========================
    # 2. зј–иЇ‘ OpenSSL (Android arm64)
    # =========================
    - name: Build OpenSSL for Android
      run: |
        git clone --depth=1 https://github.com/openssl/openssl.git
        cd openssl

        export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
        export PATH=$TOOLCHAIN/bin:$PATH

        export TARGET=aarch64-linux-android
        export API=$ANDROID_API

        ./Configure android-arm64 \
          --prefix=$PWD/../openssl-build \
          no-shared

        make -j$(nproc)
        make install_sw

    # =========================
    # 3. зј–иЇ‘ SmartDNS
    # =========================
    - name: Build SmartDNS
      run: |
        export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
        export PATH=$TOOLCHAIN/bin:$PATH

        export CC=aarch64-linux-android${ANDROID_API}-clang
        export CXX=aarch64-linux-android${ANDROID_API}-clang++

        export OPENSSL_DIR=$PWD/openssl-build

        make clean || true

        make -j$(nproc) \
          CC=$CC \
          CXX=$CXX \
          CFLAGS="-O2 -I$OPENSSL_DIR/include" \
          LDFLAGS="-L$OPENSSL_DIR/lib -lssl -lcrypto"

    # =========================
    # 4. ж‰“еЊ…
    # =========================
    - name: Package
      run: |
        mkdir -p dist
        cp src/smartdns dist/smartdns-android-arm64

    # =========================
    # 5. еЏ‘еёѓ Release
    # =========================
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        tag_name: android-arm64-${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}