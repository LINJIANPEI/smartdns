name: Linux ARM64 musl (SmartDNS + TLS)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 📦 下载 musl ARM64 交叉工具链（关键）
    - name: Setup musl toolchain
      run: |
        wget -q https://musl.cc/aarch64-linux-musl-cross.tgz
        tar -xzf aarch64-linux-musl-cross.tgz
        echo "$PWD/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH

    # ⚡ 缓存 OpenSSL
    - name: Cache OpenSSL
      id: cache-openssl
      uses: actions/cache@v4
      with:
        path: openssl-build
        key: openssl-musl-arm64-v1

    # 🔐 编译 OpenSSL（ARM64 musl 静态）
    - name: Build OpenSSL
      if: steps.cache-openssl.outputs.cache-hit != 'true'
      run: |
        git clone --depth=1 https://github.com/openssl/openssl.git
        cd openssl

        export CC=aarch64-linux-musl-gcc

        ./Configure linux-aarch64 \
          no-shared no-tests \
          --prefix=$PWD/../openssl-build

        make -j$(nproc)
        make install_sw

    # 🧱 编译 SmartDNS（完全静态）
    - name: Build SmartDNS
      run: |
        make clean || true

        export CC=aarch64-linux-musl-gcc

        make \
          CC=$CC \
          CFLAGS="-O2 -static -I$PWD/openssl-build/include" \
          LDFLAGS="-static -L$PWD/openssl-build/lib" \
          -j$(nproc)

        mkdir -p dist
        cp src/smartdns dist/smartdns-linux-arm64-musl

    # 🔍 验证是否完全静态
    - name: Verify
      run: |
        file dist/smartdns-linux-arm64-musl
        ldd dist/smartdns-linux-arm64-musl || true

    # ⚡ strip（减小体积）
    - name: Strip
      run: |
        aarch64-linux-musl-strip dist/smartdns-linux-arm64-musl

    # 📦 打包
    - name: Package
      run: |
        cd dist
        tar -czf smartdns-linux-arm64-musl.tar.gz smartdns-linux-arm64-musl

    # 🚀 发布
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: arm64-musl-${{ github.run_number }}
        files: |
          dist/smartdns-linux-arm64-musl
          dist/smartdns-linux-arm64-musl.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}