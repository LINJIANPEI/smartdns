name: Android Build (SmartDNS + OpenSSL TLS)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      ANDROID_NDK_VERSION: r26d
      ANDROID_API: 21

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 📥 下载 NDK
    - name: Setup Android NDK
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux.zip
        unzip -q android-ndk-${ANDROID_NDK_VERSION}-linux.zip
        echo "NDK=$PWD/android-ndk-${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

    # ⚡ 缓存 OpenSSL
    - name: Cache OpenSSL
      id: cache-openssl
      uses: actions/cache@v4
      with:
        path: openssl-build
        key: openssl-android-arm64-v2

    # 🔐 编译 OpenSSL（关键：clang 方案）
    - name: Build OpenSSL (Android ARM64)
      if: steps.cache-openssl.outputs.cache-hit != 'true'
      run: |
        git clone --depth=1 https://github.com/openssl/openssl.git
        cd openssl

        export ANDROID_NDK=$NDK
        export TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64
        export PATH=$TOOLCHAIN/bin:$PATH

        # ⭐ 关键：强制 clang（解决 gcc 不存在问题）
        export CC=aarch64-linux-android${ANDROID_API}-clang
        export CXX=aarch64-linux-android${ANDROID_API}-clang++
        export AR=llvm-ar
        export AS=llvm-as
        export LD=ld.lld
        export RANLIB=llvm-ranlib
        export STRIP=llvm-strip

        ./Configure android-arm64 \
          -D__ANDROID_API__=${ANDROID_API} \
          no-tests no-shared \
          --prefix=$PWD/../openssl-build

        make -j$(nproc)
        make install_sw

    # 🧱 编译 SmartDNS
    - name: Build SmartDNS (Android ARM64)
      run: |
        export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
        export PATH=$TOOLCHAIN/bin:$PATH

        make clean || true

        export CC=aarch64-linux-android${ANDROID_API}-clang

        make \
          CC=$CC \
          CFLAGS="-I$PWD/openssl-build/include" \
          LDFLAGS="-L$PWD/openssl-build/lib" \
          -j$(nproc)

        mkdir -p dist
        cp src/smartdns dist/smartdns-android-arm64-v8a

    # ⚡ strip（减小体积）
    - name: Strip Binary
      run: |
        $NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip dist/smartdns-android-arm64-v8a

    # 📦 打包
    - name: Package
      run: |
        cd dist
        tar -czf smartdns-android-arm64-v8a.tar.gz smartdns-android-arm64-v8a

    # 🚀 发布
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: android-${{ github.run_number }}
        files: |
          dist/smartdns-android-arm64-v8a
          dist/smartdns-android-arm64-v8a.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}