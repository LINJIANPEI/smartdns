name: SmartDNS Android (Stable NDK)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_API: 21
      NDK: ${{ github.workspace }}/android-ndk

    steps:
      - uses: actions/checkout@v4

      # =====================
      # 1. 用旧 NDK（r21e）
      # =====================
      - name: Install NDK r21e
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip android-ndk-r21e-linux-x86_64.zip
          mv android-ndk-r21e $NDK

      # =====================
      # 2. OpenSSL（稳定编译）
      # =====================
      - name: Build OpenSSL
        run: |
          git clone --depth=1 https://github.com/openssl/openssl.git
          cd openssl

          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH

          export CC=aarch64-linux-android21-clang
          export CXX=aarch64-linux-android21-clang++

          ./Configure android-arm64 \
            no-shared no-tests \
            --prefix=$PWD/../openssl-build

          make -j$(nproc)
          make install_sw

      # =====================
      # 3. SmartDNS
      # =====================
      - name: Build SmartDNS
        run: |
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH

          make clean || true

          make \
            WITH_TLS=1 \
            WITH_OPENSSL=1 \
            OPENSSL_DIR=$PWD/openssl-build \
            -j$(nproc)

      # =====================
      # 4. 打包
      # =====================
      - name: Package
        run: |
          mkdir -p dist
          cp src/smartdns dist/smartdns-android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: smartdns-arm64
          path: dist/