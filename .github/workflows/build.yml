name: smartdns-android-arm64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_API: 21
      NDK: ${{ github.workspace }}/android-ndk

    steps:
      - name: Checkout SmartDNS
        uses: actions/checkout@v4

      # =========================
      # 1. 安装 NDK
      # =========================
      - name: Setup NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          mv android-ndk-r26d $NDK

      # =========================
      # 2. 编译 OpenSSL（关键正确方式）
      # =========================
      - name: Build OpenSSL
        run: |
          git clone --depth=1 https://github.com/openssl/openssl.git
          cd openssl

          export PATH=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH

          export TARGET=android-arm64
          export API=$ANDROID_API

          # ⚠️ OpenSSL 正确方式（重点）
          ./Configure $TARGET \
            --prefix=$PWD/../openssl-build \
            --openssldir=$PWD/../openssl-build \
            no-shared \
            no-tests \
            -D__ANDROID_API__=$API \
            CC=aarch64-linux-android${API}-clang

          make -j$(nproc)
          make install_sw

      # =========================
      # 3. 编译 SmartDNS（开启 TLS）
      # =========================
      - name: Build SmartDNS
        run: |
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH

          export OPENSSL_ROOT=$PWD/openssl-build

          make clean || true

          make \
            CC=aarch64-linux-android${ANDROID_API}-clang \
            CFLAGS="-O2 -I$OPENSSL_ROOT/include" \
            LDFLAGS="-L$OPENSSL_ROOT/lib" \
            WITH_TLS=1 \
            WITH_OPENSSL=1 \
            -j$(nproc)

          mkdir -p dist
          cp src/smartdns dist/smartdns-android-arm64

      # =========================
      # 4. 上传产物
      # =========================
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: smartdns-android-arm64
          path: dist/