name: smartdns-stable-ci

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

# =========================
# VERSION
# =========================
  version:
    runs-on: ubuntu-latest
    outputs:
      stable: ${{ steps.v.outputs.stable }}
      nightly: ${{ steps.v.outputs.nightly }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: v
        run: |
          DATE=$(date +%Y%m%d)
          RUN=${GITHUB_RUN_NUMBER}

          NIGHTLY="nightly-${DATE}-${RUN}"

          LAST=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LAST" ]; then
            LAST="v1.0.0"
          fi

          IFS='.' read -r M m p <<< "${LAST#v}"
          p=$((p+1))

          STABLE="v${M}.${m}.${p}"

          echo "stable=$STABLE" >> $GITHUB_OUTPUT
          echo "nightly=$NIGHTLY" >> $GITHUB_OUTPUT

# =========================
# AMD64 (native + TLS OK)
# =========================
  linux-amd64:
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev

          make clean || true
          make -j$(nproc)

          mkdir -p dist
          cp src/smartdns dist/smartdns-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: amd64
          path: dist/smartdns-linux-amd64

# =========================
# ARM64 (FIXED: Docker native build)
# =========================
  linux-arm64:
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - name: Build ARM64 via Docker (FIX TLS/sysroot issues)
        run: |
          docker run --rm --platform linux/arm64 \
            -v $PWD:/src -w /src \
            ubuntu:24.04 bash -c "
              apt update &&
              apt install -y build-essential libssl-dev git &&
              make clean || true &&
              make -j\$(nproc)
            "

          mkdir -p dist
          cp src/smartdns dist/smartdns-linux-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: arm64
          path: dist/smartdns-linux-arm64

# =========================
# MUSL (static)
# =========================
  linux-musl:
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools build-essential libssl-dev

          make clean || true

          make CC=musl-gcc \
               LDFLAGS="-static" \
               -j$(nproc)

          mkdir -p dist
          cp src/smartdns dist/smartdns-linux-musl-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: musl
          path: dist/smartdns-linux-musl-amd64

# =========================
# ANDROID (ARM64-V8A)
# =========================
  android:
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - name: Install Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip

      - name: Build Android
        run: |
          export NDK=$PWD/android-ndk-r26d
          export CC=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang

          make clean || true

          make CC=$CC -j$(nproc)

          mkdir -p dist
          cp src/smartdns dist/smartdns-android-arm64-v8a

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/smartdns-android-arm64-v8a

# =========================
# STABLE RELEASE
# =========================
  release-stable:
    needs: [version, linux-amd64, linux-arm64, linux-musl, android]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with: { name: amd64 }

      - uses: actions/download-artifact@v4
        with: { name: arm64 }

      - uses: actions/download-artifact@v4
        with: { name: musl }

      - uses: actions/download-artifact@v4
        with: { name: android }

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.stable }}
          name: SmartDNS ${{ needs.version.outputs.stable }}
          body: |
            ## 🚀 Stable Release

            ✔ AMD64 (TLS)  
            ✔ ARM64 (Docker native, TLS OK)  
            ✔ MUSL static  
            ✔ Android arm64-v8a  
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.stable }}
          files: |
            smartdns-linux-amd64
            smartdns-linux-arm64
            smartdns-linux-musl-amd64
            smartdns-android-arm64-v8a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# =========================
# NIGHTLY
# =========================
  release-nightly:
    needs: [version, linux-amd64, linux-arm64]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with: { name: amd64 }

      - uses: actions/download-artifact@v4
        with: { name: arm64 }

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.nightly }}
          prerelease: true
          name: SmartDNS Nightly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.nightly }}
          files: |
            smartdns-linux-amd64
            smartdns-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}