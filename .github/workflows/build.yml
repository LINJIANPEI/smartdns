name: SmartDNS Android ARM64 TLS Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_API: 21
      NDK_VERSION: r26d

    steps:
      # =========================
      # 1. 拉代码
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 2. 安装 NDK
      # =========================
      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip
          unzip android-ndk-${NDK_VERSION}-linux.zip
          echo "NDK=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      # =========================
      # 3. 编译 OpenSSL（关键修复点）
      # =========================
      - name: Build OpenSSL (Android arm64)
        run: |
          git clone --depth=1 https://github.com/openssl/openssl.git
          cd openssl

          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH

          export API=$ANDROID_API
          export TARGET=aarch64-linux-android

          # ⭐关键：必须用 clang（不能让它找 gcc）
          export CC=$TARGET$API-clang
          export CXX=$TARGET$API-clang++
          export AR=llvm-ar
          export AS=llvm-as
          export LD=ld.lld
          export RANLIB=llvm-ranlib
          export STRIP=llvm-strip

          make clean || true

          ./Configure android-arm64 \
            no-shared \
            no-tests \
            --prefix=$PWD/../openssl-build \
            CC=$CC

          make -j2
          make install_sw

      # =========================
      # 4. 编译 SmartDNS（启用 TLS）
      # =========================
      - name: Build SmartDNS
        run: |
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export PATH=$TOOLCHAIN/bin:$PATH

          export API=$ANDROID_API
          export TARGET=aarch64-linux-android

          export CC=$TARGET$API-clang
          export CXX=$TARGET$API-clang++

          export OPENSSL_DIR=$PWD/openssl-build

          make clean || true

          make -j2 \
            CC=$CC \
            CXX=$CXX \
            CFLAGS="-O2 -I$OPENSSL_DIR/include" \
            LDFLAGS="-L$OPENSSL_DIR/lib -lssl -lcrypto"

      # =========================
      # 5. 打包
      # =========================
      - name: Package
        run: |
          mkdir -p dist
          cp src/smartdns dist/smartdns-android-arm64

      # =========================
      # 6. 发布 Release
      # =========================
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: android-arm64-${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}